<!--
  Syncwatch — ненавязчивый блок для страницы аниме на AnimeDB.
  Самодостаточный: HTML + CSS + JS в одном куске, без внешних зависимостей.

  Как встроить:
  1. Вставить этот блок в шаблон страницы тайтла (рядом с кнопкой просмотра / списком серий).
  2. Задать название тайтла в data-title (для метки комнаты) — например из переменной шаблона.
  3. При желании поменять data-download (страница загрузки) и data-scheme.

  Поведение: маленькая карточка, кнопка «Смотреть вместе», крестик «скрыть».
  После закрытия не показывается (localStorage). Кнопка пытается открыть установленное
  приложение через syncwatch://create?title=..., если не установлено — ведёт на страницу загрузки.
-->
<div
  class="sw-rec"
  id="sw-rec"
  data-title="{{ANIME_TITLE}}"
  data-download="https://animedb.example/syncwatch"
  data-scheme="syncwatch"
  hidden
>
  <div class="sw-rec__icon">🎬</div>
  <div class="sw-rec__body">
    <div class="sw-rec__title">Смотреть вместе с друзьями</div>
    <div class="sw-rec__text">Синхронный просмотр с чатом через Syncwatch — каждый со своим файлом.</div>
  </div>
  <button class="sw-rec__btn" id="sw-rec-go" type="button">Создать комнату</button>
  <button class="sw-rec__close" id="sw-rec-close" type="button" aria-label="Скрыть">×</button>
</div>

<style>
  .sw-rec {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 640px;
    margin: 12px 0;
    padding: 12px 14px;
    background: linear-gradient(120deg, rgba(124, 58, 237, 0.12), rgba(168, 85, 247, 0.06));
    border: 1px solid rgba(168, 85, 247, 0.35);
    border-radius: 12px;
    color: #e5e5ea;
    font-family: system-ui, 'Segoe UI', sans-serif;
    position: relative;
  }
  .sw-rec__icon {
    font-size: 26px;
    flex: 0 0 auto;
  }
  .sw-rec__body {
    flex: 1 1 auto;
    min-width: 0;
  }
  .sw-rec__title {
    font-weight: 600;
    font-size: 14px;
  }
  .sw-rec__text {
    font-size: 12px;
    color: #a1a1aa;
    margin-top: 2px;
  }
  .sw-rec__btn {
    flex: 0 0 auto;
    background: #7c3aed;
    color: #fff;
    border: 0;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .sw-rec__btn:hover {
    background: #8b5cf6;
  }
  .sw-rec__close {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: 0;
    color: #71717a;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }
  .sw-rec__close:hover {
    color: #e5e5ea;
  }
  @media (max-width: 520px) {
    .sw-rec {
      flex-wrap: wrap;
    }
    .sw-rec__btn {
      width: 100%;
    }
  }
</style>

<script>
  (function () {
    var KEY = 'sw_rec_dismissed';
    var el = document.getElementById('sw-rec');
    if (!el || localStorage.getItem(KEY) === '1') return;
    el.hidden = false;

    var title = el.getAttribute('data-title') || '';
    var download = el.getAttribute('data-download');
    var scheme = el.getAttribute('data-scheme') || 'syncwatch';

    document.getElementById('sw-rec-close').addEventListener('click', function () {
      el.hidden = true;
      localStorage.setItem(KEY, '1');
    });

    document.getElementById('sw-rec-go').addEventListener('click', function () {
      var link = scheme + '://create?title=' + encodeURIComponent(title);
      // Пытаемся открыть приложение; если не установлено — уводим на страницу загрузки.
      var fallback = setTimeout(function () {
        window.location.href = download;
      }, 1500);
      // Если приложение открылось, вкладка теряет фокус — отменяем фолбэк.
      window.addEventListener(
        'blur',
        function () {
          clearTimeout(fallback);
        },
        { once: true },
      );
      window.location.href = link;
    });
  })();
</script>
